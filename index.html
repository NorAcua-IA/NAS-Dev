// Fetch base con headers v3
const _sb = async (path, opts = {}) => {
  const r = await fetch(SB_URL + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      ...V3_HDR,
      ...(opts.headers || {})
    }
  });
  if (!r.ok) { const e = await r.text(); console.error('[NorAcuaV3]', r.status, path, e); return null; }
  const ct = r.headers.get('content-type') || '';
  if (r.status === 204 || !ct.includes('json')) return true;
  return r.json();
};

    id: sup.id,

    zona: sup.zona || '',
    fecha: sup.fecha,
    horas_facturables: sup.horas !== '' && sup.horas != null ? parseFloat(sup.horas) : null,
    estado: sup.estado === 'pendiente' ? 'pendiente' : (sup.estado === 'aprobado' ? 'aprobada' : (sup.estado === 'anulado' ? 'completada' : sup.estado || 'pendiente')),
    po: sup.po || null,
    datos_supervision: {
      site: sup.site || '',
      tipoActividad: sup.tipoActividad || '',
      pctAuditoria: sup.pctAuditoria || '',
      obraConSupervision: sup.obraConSupervision || '',
      horas: sup.horas || '',
      horasAdmin: sup.horasAdmin != null ? sup.horasAdmin : sup.horas,

      incidencias: sup.incidencias || '',

// Convierte filas v3 de na_conceptos al formato plano que espera React (igual que FRESH_CAT)
// FRESH_CAT = array plano de items con {id, nombre, capId, p, activo}
function _rowsToConcs(capitulos, conceptos) {
  // Mapa capitulo_id → código corto del capítulo (ej. "1", "2"...)
  // Intentamos primero con la columna "codigo", luego con "orden", luego con índice
  const capCodMap = {};
  const capNomMap = {}; // para fallback por nombre
  (capitulos || []).forEach((cap, idx) => {
    // na_capitulos.codigo is "CAP01","CAP02"... convert to short code "1","2"...
    // that matches CAP_BASE.cap which uses "1","2"...
    const rawCod = cap.codigo || '';
    const cod = rawCod.replace(/^CAP0?/, '') || String(cap.orden || idx + 1);
    capCodMap[cap.id] = cod;
    capNomMap[cap.id] = cap.nombre || '';
  });

  // Si no hay capitulos en BD, intentar deducir capId del nombre del concepto
  // comparando con CAP_BASE (fallback para cuando preciario_bp_produccion.sql aún no se ha cargado)
  const hayCapitulos = Object.keys(capCodMap).length > 0;

  return (conceptos || []).map(c => {
    let capId = '';
    if (hayCapitulos && c.capitulo_id) {
      capId = capCodMap[c.capitulo_id] || c.capitulo_id;
    }
    // v3 schema: precio es una sola columna; precios_zona puede estar en datos_extra o deducido
    // Si el schema tiene precios_zona (jsonb) usarlo; si no, mapear precio único a todas las zonas
    let p;
    if (c.precios_zona && typeof c.precios_zona === 'object') {
      p = c.precios_zona;
    } else if (c.precio != null) {
      // precio único → aplicar a todas las zonas (simplificación hasta cargar preciario BP)
      p = { CENTRO: c.precio, NORTE: c.precio, 'CATALUÑA': c.precio, BALEARES: c.precio, OTROS: c.precio };
    } else {
      p = { CENTRO: null, NORTE: null, 'CATALUÑA': null, BALEARES: null, OTROS: null };
    }
    return {
      id: c.id,
      nombre: c.nombre || '',
      capId,
      activo: c.activo !== false,
      p
    };
  });
}

// Convierte el array plano concs[] a filas na_conceptos para upsert
function _concsToRows(concs) {
  return concs.map(item => ({
    id: item.id,
    nombre: item.nombre || '',
    capitulo_id: item.capId || null,
    precios_zona: item.p || {},   // si la columna existe en el schema
    precio: item.p?.CENTRO ?? null,  // columna precio (schema v3 real)
    activo: item.activo !== false
  }));
}

// Guarda conceptos a Supabase v3 (reemplaza aesEnc/sv(SK.cEnc,...))
async function saveConcsV3(arr) {
  const rows = _concsToRows(arr);
  if (!rows.length) return;
  for (let i = 0; i < rows.length; i += 50) {
    await _sb('/rest/v1/na_conceptos', {
      method: 'POST',
      body: JSON.stringify(rows.slice(i, i + 50)),
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' }
    });
  }
}

// Guarda o actualiza un único registro en Supabase v3
async function saveRegistroV3(reg) {
  const row = _regToRow(reg, window._naTecnicoIdMap);
  await dbRegistros.upsert(row);
  // Si es grupo, sincronizar líneas
  if (reg.esGrupo && Array.isArray(reg.lineasGrupo)) {
    await dbLineasRegistro.deleteByRegistro(reg.id);
    const lineas = reg.lineasGrupo.map((l, i) => ({
      id: l.id || (reg.id + '_l' + i),
      registro_id: reg.id,
      concepto_id: l.conceptoId || null,
      concepto_nombre: l.conceptoNombre || l.nombre || '',
      cantidad: parseFloat(l.cantidad) || 1,
      precio_unitario: l.precioUnitario != null ? l.precioUnitario : null,
      orden: i
    }));
    if (lineas.length) await _sb('/rest/v1/na_lineas_registro', {
      method: 'POST', body: JSON.stringify(lineas),
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' }
    });
  }
}

async function sha256(s) {
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, "0")).join("");
}
async function deriveKey(pw) {
  const k = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), {
    name: "PBKDF2"
  }, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({
    name: "PBKDF2",
    salt: new TextEncoder().encode("noracua-salt-v4"),
    iterations: 100000,
    hash: "SHA-256"
  }, k, {
    name: "AES-GCM",
    length: 256
  }, false, ["encrypt", "decrypt"]);
}
async function aesEnc(key, data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = await crypto.subtle.encrypt({
    name: "AES-GCM",
    iv
  }, key, new TextEncoder().encode(JSON.stringify(data)));
  const out = new Uint8Array(12 + enc.byteLength);
  out.set(iv);
  out.set(new Uint8Array(enc), 12);
  return btoa(String.fromCharCode(...out));
}
async function aesDec(key, b64) {
  const d = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const dec = await crypto.subtle.decrypt({
    name: "AES-GCM",
    iv: d.slice(0, 12)
  }, key, d.slice(12));
  return JSON.parse(new TextDecoder().decode(dec));
}

window._backupDirHandle = null;
const BACKUP_MAX_FILES = 10;
const BACKUP_INTERVAL_MS = 2 * 60 * 60 * 1000; // 2 horas
const GH_OWNER = "noracua-ia";
const GH_REPO  = "NA-Backup";
const GH_PATH  = "data/noracua-latest.json";
const GH_API   = "https://api.github.com";

function getGhToken() { return localStorage.getItem('na_gh_token') || ""; }

async function ghPush(datos) {
  const token = getGhToken();
  if (!token) return { ok: false, msg: "No hay token de GitHub configurado" };
  try {
    const content = btoa(unescape(encodeURIComponent(
      JSON.stringify({ fecha: new Date().toISOString(), version: APP_VERSION, datos }, null, 2)
    )));
    let sha = null;
    const getR = await fetch(GH_API+'/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_PATH, {
      headers: { Authorization: 'token '+token, Accept: "application/vnd.github.v3+json" }
    });
    if (getR.ok) { const j = await getR.json(); sha = j.sha; }
    const putR = await fetch(GH_API+'/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_PATH, {
      method: "PUT",
      headers: { Authorization: 'token '+token, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify({ message: 'Backup NorAcua '+new Date().toLocaleString('es-ES'), content, ...(sha ? { sha } : {}) })
    });
    if (!putR.ok) { const err = await putR.text(); return { ok: false, msg: 'GitHub '+putR.status+': '+err.slice(0,100) }; }
    localStorage.setItem('na_gh_last', new Date().toISOString());
    return { ok: true, msg: "OK" };
  } catch(e) { return { ok: false, msg: e.message }; }
}

async function ghPull() {
  const token = getGhToken();
  if (!token) return null;
  try {
    const r = await fetch(GH_API+'/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_PATH, {
      headers: { Authorization: 'token '+token, Accept: "application/vnd.github.v3+json" }
    });
    if (!r.ok) return null;
    const j = await r.json();
    const decoded = decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    return JSON.parse(decoded).datos || null;
  } catch(e) { return null; }
}

// ── INDEXEDDB: persistir FileSystemDirectoryHandle entre recargas ──
async function _idbSaveHandle(h) {
  return new Promise(res => {
    try {
      const req = indexedDB.open('noracua-fs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
      req.onsuccess = e => {
        const tx = e.target.result.transaction('handles', 'readwrite');
        tx.objectStore('handles').put(h, 'backup-dir');
        tx.oncomplete = () => res(true); tx.onerror = () => res(false);
      };
      req.onerror = () => res(false);
    } catch(e) { res(false); }
  });
}
async function _idbLoadHandle() {
  return new Promise(res => {
    try {
      const req = indexedDB.open('noracua-fs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
      req.onsuccess = e => {
        const tx = e.target.result.transaction('handles', 'readonly');
        const gr = tx.objectStore('handles').get('backup-dir');
        gr.onsuccess = () => res(gr.result || null); gr.onerror = () => res(null);
      };
      req.onerror = () => res(null);
    } catch(e) { res(null); }
  });
}
// Intenta restaurar el handle sin prompt de usuario (solo si ya tiene permiso en sesión activa)
async function tryRestoreBackupFolder() {
  try {
    const h = await _idbLoadHandle();
    if (!h) return false;
    const perm = await h.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') { window._backupDirHandle = h; console.log('[NorAcua] Carpeta de backups restaurada automáticamente'); return true; }
    // Permiso caducado — guardar para reconexión con gesto del usuario
    window._idbBackupHandle = h;
    return false;
  } catch(e) { return false; }
}

// autoMode=true: backups automáticos — NO descargar si no hay handle (evita lluvia de ficheros en Descargas)
// autoMode=false (defecto): backup manual explícito — sí descarga como fallback
async function saveBackupFile(datos, autoMode = false) {
  const ts = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fn = 'noracua-bk-'+ts.getFullYear()+pad(ts.getMonth()+1)+pad(ts.getDate())+'-'+pad(ts.getHours())+pad(ts.getMinutes())+'.json';
  const json = JSON.stringify({ fecha: ts.toISOString(), version: APP_VERSION, datos }, null, 2);
  if (window._backupDirHandle) {
    try {
      const fh = await window._backupDirHandle.getFileHandle(fn, { create: true });
      const w = await fh.createWritable(); await w.write(json); await w.close();
      const files = [];
      for await (const e of window._backupDirHandle.values()) { if (e.kind==='file'&&e.name.startsWith('noracua-bk-')) files.push(e.name); }
      for (const name of files.sort().slice(0, Math.max(0, files.length-BACKUP_MAX_FILES))) { try { await window._backupDirHandle.removeEntry(name); } catch(e){} }
      localStorage.setItem('na_backup_last', ts.toISOString());
      return true;
    } catch(e) { console.warn('[NorAcua] saveBackupFile:', e.message); }
  }
  if (autoMode) { console.log('[NorAcua] Backup automático — sin carpeta configurada, omitiendo descarga'); return false; }
  // Solo aquí si es backup MANUAL explícito
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=fn; a.click(); URL.revokeObjectURL(url);
  localStorage.setItem('na_backup_last', ts.toISOString());
  return false;
}

async function autoBackup(datos) {
  try {
    const fecha = new Date();
    const bkKey = 'na-backup-' + fecha.toISOString().slice(0,13).replace(/[^0-9]/g,'');
    // v3: datos = {proyectos, registros, facturas, ofertas, clientes, hsse}
    // Compact: strip HTML from informes if present
    const datosCompactos = { ...datos };
    if (Array.isArray(datosCompactos.historico)) {
      datosCompactos.historico = datosCompactos.historico.map(e => {
        const { html: _h, ...rest } = e; return { ...rest, _htmlStripped: true };
      });
    }
    const snapshot = JSON.stringify({ fecha: fecha.toISOString(), version: APP_VERSION, datos: datosCompactos });
    // Guardar en localStorage (rolling últimos BACKUP_MAX_FILES)
    localStorage.setItem('na_autobk_' + bkKey, snapshot);
    localStorage.setItem('na_autobk_last', fecha.toISOString());
    Object.keys(localStorage).filter(k => k.startsWith('na_autobk_na-backup-')).sort().reverse().slice(BACKUP_MAX_FILES).forEach(k => localStorage.removeItem(k));
    // Guardar en GitHub
    const _ghR = await ghPush(datosCompactos);
    if (!_ghR.ok) console.warn('[NorAcuaV3] GitHub backup:', _ghR.msg);
    else localStorage.setItem('na_gh_last', new Date().toISOString());
    // Guardar en carpeta local si está configurada
    await saveBackupFile(datosCompactos, true);
  } catch(e) { console.warn('[NorAcuaV3] autoBackup error:', e.message); }
}

function genPDFFactura({
  doc,
  cliente,
  poRef
}) {
  const {
    base,
    iva,
    total
  } = calcDocTotal(doc);
  const neg = doc.tipo === "Abono" ? -1 : 1;
  const fmtN = n => n == null ? "- €" : Math.abs(n).toLocaleString("es-ES", {
    minimumFractionDigits: 2,
    useGrouping: true
  }) + " €";
  const ivaMap = {};
  let totalDto = 0;
  (doc.lineas || []).forEach(l => {
    if (l.esCabecera) return;
    const k = l.iva;
    if (!ivaMap[k]) ivaMap[k] = 0;
    ivaMap[k] += calcLinea(l, neg).sub;
    totalDto += (Number(l.precio) || 0) * (Number(l.uds) || 1) * ((Number(l.descuento) || 0) / 100) * neg;
  });
  const ivaRows = Object.entries(ivaMap).filter(([, b]) => b !== 0).map(([p, b]) => `<tr><td style="text-align:right;padding:2px 8px">IVA ${p}%:</td><td style="text-align:right;padding:2px 8px">${fmtN(Math.round(b * Number(p)) / 100)}</td></tr>`).join("");
  const poEfectiva = doc.poRef || poRef || "";
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><style>

function genPDFOferta({
  oferta,
  cliente,
  concs
}) {
  const fmtN = n => (n || 0).toLocaleString("es-ES", {
    minimumFractionDigits: 2,
    useGrouping: true
  }) + " €";
  const total = calcOfertaTotal(oferta.lineas || []);
  const grupos = {};
  (oferta.lineas || []).forEach(l => {
    const c = concs.find(x => x.id === l.conceptoId);
    const cap = c ? CAP_BASE.find(x => x.cap === c.capId) : null;
    const key = cap ? cap.cap : "0";
    const nom = cap ? `${cap.cap}. ${cap.nombre}` : "Sin capítulo";
    if (!grupos[key]) grupos[key] = {
      nom,
      items: []
    };
    grupos[key].items.push({
      l,
      c
    });
  });
  const tablaLineas = Object.values(grupos).map(({
    nom,
    items
  }) => `
    <tr class="cap-row"><td colspan="4">${nom}</td></tr>
    ${items.map(({
    l,
    c
  }) => {
    const sub = calcOfertaLinea(l);
    return `<tr><td>${c?.id ? `${c.id} - ` : ""}${c?.nombre || l.conceptoId}${l.comentario ? `<div style="font-size:10px;color:#666;margin-top:2px">${l.comentario}</div>` : ""}</td><td style="text-align:center">${l.cantidad || 1}</td><td style="text-align:right">${fmtN(l.precioUnit)}${Number(l.descuento) > 0 ? ` (-${l.descuento}%)` : ""}</td><td style="text-align:right;font-weight:700">${fmtN(sub)}</td></tr>`;
  }).join("")}`).join("");
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><style>
